<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SchoolHub</title>
  <base href="/gaming/">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0b1020;
      color: #ffffff;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    main {
      width: min(520px, 100%);
      padding: 40px 24px;
      border: 1px solid #33405f;
      border-radius: 20px;
      background: #121a30;
    }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 8vw, 4rem); }
    p { margin: 0; color: #aebbd7; font-size: 1.1rem; }
    .info {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #33405f;
      font-size: 0.9rem;
      color: #7a8ba8;
    }
  </style>
</head>
<body>
  <main>
    <h1>SchoolHub</h1>
    <p>Your collaborative learning platform</p>
    <div class="info">
      <p>🚀 Deployed on GitHub Pages</p>
    </div>
  </main>
</body>
</html>
